<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI-STREAM | TPM SPI Analyzer</title>
    
    <!-- Premium Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: { 900: '#0a0a0c', 800: '#121216', 700: '#1a1a20' },
                        primary: '#3b82f6',
                        accent: '#10b981',
                        terminal: { bg: '#050505', text: '#d1d5db', system: '#38bdf8', success: '#34d399', error: '#f87171' }
                    }
                }
            }
        }
    </script>
    
    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">

</head>
<body class="bg-base-900 text-gray-300 h-screen w-screen font-sans selection:bg-primary/30 selection:text-white antialiased overflow-hidden flex">

    <!-- LEFT PANEL: Controls (35% width) -->
    <aside class="w-[380px] xl:w-[420px] bg-base-800 border-r border-base-700 flex flex-col flex-shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.5)]">    
        <!-- Header -->
        <div class="px-6 py-5 flex items-center justify-between border-b border-base-700">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-md bg-blue-500/10 border border-blue-500/20 flex items-center justify-center text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                    <i data-lucide="microchip" class="w-4 h-4"></i>
                </div>
                <div>
                    <h1 class="font-bold text-gray-100 tracking-tight leading-tight">SPI-STREAM</h1>
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Analyzer Engine</p>
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">@arushmangalambajpai</p>
                </div>
            </div>
            
            <!-- Dynamic Engine Status -->
            <div id="engine-status" class="flex items-center gap-2 px-2.5 py-1.5 rounded-full bg-base-900 border border-base-700 text-[10px] font-medium transition-colors duration-300">
                <i data-lucide="loader-2" class="w-3 h-3 text-blue-400 animate-spin"></i>
                <span id="engine-status-text" class="text-gray-400 uppercase tracking-wider">Loading...</span>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="px-6 py-4">
            <div class="flex bg-base-900 rounded-lg p-1 border border-base-700 shadow-inner">
                <button onclick="switchTab('single')" id="tab-single" class="flex-1 py-1.5 text-xs font-semibold rounded-md bg-base-700 text-white shadow-sm transition-all">
                    Single Decode
                </button>
                <button onclick="switchTab('csv')" id="tab-csv" class="flex-1 py-1.5 text-xs font-semibold rounded-md text-gray-400 hover:text-gray-200 transition-all">
                    CSV Analyzer
                </button>
            </div>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto px-6 pb-8">
            
            <!-- ========================================== -->
            <!-- SINGLE DECODE VIEW                         -->
            <!-- ========================================== -->
            <div id="view-single" class="space-y-6 animate-fade-in block">
                
                <!-- Toggles -->
                <div class="flex gap-4">
                    <div class="flex-1 space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Interface</label>
                        <div class="flex bg-base-900 rounded-md p-0.5 border border-base-700">
                            <label class="flex-1 text-center py-1.5 rounded bg-base-700 text-white text-xs font-medium cursor-pointer transition-all">
                                <input type="radio" name="interface" value="FIFO" checked class="hidden"> FIFO
                            </label>
                            <label class="flex-1 text-center py-1.5 rounded text-gray-400 hover:text-white text-xs font-medium cursor-pointer transition-all">
                                <input type="radio" name="interface" value="CRB" class="hidden"> CRB
                            </label>
                        </div>
                    </div>
                    <div class="flex-1 space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Mode</label>
                        <div class="flex bg-base-900 rounded-md p-0.5 border border-base-700">
                            <label class="flex-1 text-center py-1.5 rounded bg-base-700 text-white text-xs font-medium cursor-pointer transition-all">
                                <input type="radio" name="mode" value="MOSI" checked class="hidden" onchange="toggleMisoInput()"> MOSI
                            </label>
                            <label class="flex-1 text-center py-1.5 rounded text-gray-400 hover:text-white text-xs font-medium cursor-pointer transition-all">
                                <input type="radio" name="mode" value="FULL" class="hidden" onchange="toggleMisoInput()"> Full TX
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Inputs -->
                <div class="space-y-4">
                    <div class="space-y-2 relative group">
                        <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="arrow-right" class="w-3 h-3"></i> MOSI Hex Data
                        </label>
                        <textarea id="mosi-input" rows="4" class="w-full bg-base-900 border border-base-700 rounded-lg p-3 text-xs font-mono text-gray-300 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 outline-none resize-none transition-all placeholder-gray-600" placeholder="34 D4 00 26 80 02..."></textarea>
                    </div>
                    
                    <div id="miso-container" class="hidden space-y-2 animate-fade-in">
                        <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="arrow-left" class="w-3 h-3"></i> MISO Hex Data
                        </label>
                        <textarea id="miso-input" rows="4" class="w-full bg-base-900 border border-base-700 rounded-lg p-3 text-xs font-mono text-gray-300 focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 outline-none resize-none transition-all placeholder-gray-600" placeholder="Enter MISO response..."></textarea>
                    </div>
                </div>

                <button onclick="runSingleDecode()" class="w-full py-3 bg-white hover:bg-gray-200 text-black text-sm font-semibold rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    <i data-lucide="play" class="w-4 h-4"></i> Run Decoder
                </button>
            </div>

            <!-- ========================================== -->
            <!-- CSV ANALYZER VIEW                          -->
            <!-- ========================================== -->
            <div id="view-csv" class="hidden space-y-6">
                
                <!-- Minimal Upload Zone -->
                <div id="drop-zone" class="border border-dashed border-base-700 hover:border-blue-500/50 bg-base-900/50 rounded-xl p-6 text-center cursor-pointer transition-all group" onclick="document.getElementById('csv-file').click()">
                    <input type="file" id="csv-file" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                    <i data-lucide="file-up" class="w-6 h-6 text-gray-500 group-hover:text-blue-400 mx-auto mb-2 transition-colors"></i>
                    <p class="text-sm font-medium text-gray-200" id="upload-text">Upload Logic Analyzer CSV</p>
                    <p class="text-[10px] text-gray-500 mt-1">Processed securely in-browser</p>
                </div>

                <!-- Clean Workflow List -->
                <div class="space-y-3 pt-2">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3">Processing Pipeline</p>
                    
                    <script>
                        const stepsData = [
                            { id: 1, title: 'Generate Transactions', file: 'clean_spi_transactions.csv' },
                            { id: 2, title: 'Decode Headers & Payloads', file: 'decoded_transactions.csv' },
                            { id: 3, title: 'Extract Command Summary', file: 'tpm_command_summary.txt' },
                            { id: 4, title: 'Analyze PCR Extensions', file: 'pcr_extend_summary.txt' }
                        ];

                        document.write(stepsData.map((step, idx) => `
                            <div id="step-${step.id}" class="step-disabled bg-base-900 border border-base-700 rounded-lg p-3 flex items-center justify-between group transition-all ${idx === 0 ? 'is-active' : ''}">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded bg-base-800 border border-base-700 text-[10px] font-bold flex items-center justify-center text-gray-500 group-[.is-active]:text-blue-400 group-[.is-active]:border-blue-500/30 group-[.is-active]:bg-blue-500/10 transition-colors">
                                        ${step.id}
                                    </div>
                                    <span class="text-xs font-medium text-gray-400 group-[.is-active]:text-gray-100">${step.title}</span>
                                </div>
                                
                                <div class="flex items-center gap-2">
                                    <button id="btn-dl-${step.id}" onclick="downloadFile('${step.file}')" class="hidden p-1.5 text-gray-400 hover:text-white bg-base-800 hover:bg-base-700 rounded transition-colors" title="Download">
                                        <i data-lucide="download" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <button onclick="runCsvStep(${step.id}, '${step.file}')" class="px-3 py-1.5 bg-base-700 hover:bg-white hover:text-black text-gray-200 text-[10px] font-bold uppercase tracking-wider rounded transition-all active:scale-95">
                                        Run
                                    </button>
                                </div>
                            </div>
                        `).join(''));
                    </script>
                </div>
            </div>

        </div>
    </aside>

    <!-- RIGHT PANEL: Massive Output Terminal (65% width) -->
    <main class="flex-1 bg-terminal-bg flex flex-col min-w-0 relative bg-grid-pattern">
        
        <!-- Subtle Gradient Overlay for depth -->
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-[#020202] pointer-events-none z-0"></div>

        <!-- Terminal Header -->
        <header class="h-12 border-b border-white/5 flex items-center justify-between px-6 bg-black/40 backdrop-blur-sm z-10">
            <div class="flex items-center gap-4">
                <!-- Mac style dots -->
                <div class="flex gap-1.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-red-500/20 border border-red-500/50"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-amber-500/20 border border-amber-500/50"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-green-500/20 border border-green-500/50"></div>
                </div>
                <span class="text-[11px] font-mono text-gray-500 flex items-center gap-2">
                    <i data-lucide="terminal" class="w-3.5 h-3.5"></i> stdout
                </span>
            </div>
            
            <button onclick="clearTerminal()" class="text-gray-500 hover:text-gray-200 transition-colors flex items-center gap-1.5 text-[11px] font-medium bg-white/5 hover:bg-white/10 px-2.5 py-1 rounded">
                <i data-lucide="trash-2" class="w-3 h-3"></i> Clear Output
            </button>
        </header>

        <!-- Huge Scrollable Output Area -->
        <div class="flex-1 overflow-auto p-6 md:p-10 z-10">
            <div id="terminal-output" class="font-mono text-[13px] sm:text-[14px] leading-relaxed text-terminal-text whitespace-pre terminal-glow min-w-max">
<span class="text-terminal-system font-bold">SPI-STREAM Framework v1.0.0</span>
[SYS] Initializing Pyodide virtual runtime environment...
</div>
        </div>
    </main>

<script src="js/app.js"></script>    
</body>
</html>
